services:
  redis:
    image: redis:7-alpine
    container_name: crypto-ia-redis
    ports:
      - "6385:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  api:
    build: .
    container_name: crypto-ia-api
    ports:
      - "8085:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=sqlite+aiosqlite:///./data/crypto_ia.db
      - DATABASE_PATH=/app/data/crypto_ia.db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - db_data:/app/data
      - ./reports:/app/reports
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    build: .
    container_name: crypto-ia-frontend
    command: ["streamlit", "run", "app_saas.py", "--server.port=8501", "--server.address=0.0.0.0", "--server.headless=true"]
    ports:
      - "8503:8501"
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/app/data/crypto_ia.db
    volumes:
      - db_data:/app/data
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  landing:
    build: .
    container_name: crypto-ia-landing
    command: ["streamlit", "run", "landing_page.py", "--server.port=8501", "--server.address=0.0.0.0", "--server.headless=true"]
    ports:
      - "8504:8501"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  db_data:
  redis_data:
